<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sCure QA Tool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }

  .header { background: #111; border-bottom: 2px solid #f44336; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 18px; color: #f44336; }
  .header .version { font-size: 11px; color: #666; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; }
  .status-dot.connected { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
  .status-dot.disconnected { background: #f44336; }
  .status-label { font-size: 11px; color: #888; }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  .config-bar { background: #151515; border: 1px solid #222; border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; }
  .config-bar label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .config-bar input { background: #0a0a0a; border: 1px solid #333; border-radius: 6px; padding: 6px 10px; color: #fff; font-size: 13px; width: 250px; }
  .config-bar input:focus { outline: none; border-color: #f44336; }

  .btn { padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
  .btn:active { transform: scale(0.97); }
  .btn-run { background: #f44336; color: #fff; }
  .btn-run:hover { background: #e53935; }
  .btn-run:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-stop { background: #ff9800; color: #000; }
  .btn-outline { background: transparent; border: 1px solid #444; color: #ccc; }
  .btn-outline:hover { border-color: #888; color: #fff; }
  .btn-small { padding: 5px 12px; font-size: 11px; border-radius: 6px; }

  .summary { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  .summary-card { background: #151515; border: 1px solid #222; border-radius: 10px; padding: 14px; text-align: center; }
  .summary-card .num { font-size: 28px; font-weight: 700; line-height: 1; }
  .summary-card .label { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.5px; }
  .num.pass { color: #4caf50; }
  .num.fail { color: #f44336; }
  .num.warn { color: #ff9800; }
  .num.skip { color: #666; }
  .num.total { color: #fff; }

  .progress-bar { width: 100%; height: 6px; background: #1a1a1a; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s; background: linear-gradient(90deg, #f44336, #ff9800, #4caf50); }

  .category { margin-bottom: 16px; }
  .category-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #151515; border: 1px solid #222; border-radius: 10px 10px 0 0; cursor: pointer; user-select: none; }
  .category-header:hover { background: #1a1a1a; }
  .category-header h3 { font-size: 14px; color: #fff; display: flex; align-items: center; gap: 8px; }
  .category-header .cat-icon { font-size: 16px; }
  .category-header .cat-stats { font-size: 11px; color: #666; }
  .category-header .expand { color: #555; transition: transform 0.2s; }
  .category.open .expand { transform: rotate(180deg); }

  .test-list { border: 1px solid #222; border-top: none; border-radius: 0 0 10px 10px; overflow: hidden; }
  .category:not(.open) .test-list { display: none; }

  .test-row { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid #1a1a1a; transition: background 0.15s; }
  .test-row:last-child { border-bottom: none; }
  .test-row:hover { background: #131313; }
  .test-row.running { background: rgba(244, 67, 54, 0.05); }

  .test-status { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; shrink: 0; }
  .test-status.pending { background: #1a1a1a; color: #444; }
  .test-status.running { background: #f44336; color: #fff; animation: pulse 1s infinite; }
  .test-status.pass { background: #1b5e20; color: #4caf50; }
  .test-status.fail { background: #b71c1c; color: #f44336; }
  .test-status.warn { background: #e65100; color: #ff9800; }
  .test-status.skip { background: #1a1a1a; color: #555; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  .test-info { flex: 1; }
  .test-name { font-size: 12px; color: #ddd; }
  .test-desc { font-size: 10px; color: #555; margin-top: 1px; }

  .test-result { font-size: 11px; font-family: monospace; color: #888; max-width: 300px; text-align: right; }
  .test-result.pass { color: #4caf50; }
  .test-result.fail { color: #f44336; }
  .test-result.warn { color: #ff9800; }

  .test-time { font-size: 10px; color: #444; font-family: monospace; width: 50px; text-align: right; }

  .log-section { margin-top: 20px; }
  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .log-header h3 { font-size: 13px; color: #888; }
  .log-box { background: #0d0d0d; border: 1px solid #222; border-radius: 10px; padding: 12px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 11px; line-height: 1.6; }
  .log-line { color: #555; }
  .log-line.info { color: #888; }
  .log-line.pass { color: #4caf50; }
  .log-line.fail { color: #f44336; }
  .log-line.warn { color: #ff9800; }
  .log-line .ts { color: #333; margin-right: 8px; }

  .report-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
  .report-modal.open { display: flex; }
  .report-content { background: #151515; border: 1px solid #333; border-radius: 14px; padding: 24px; width: 600px; max-height: 80vh; overflow-y: auto; }
  .report-content h2 { color: #fff; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>sCure QA Tool</h1>
    <div class="version">v1.0.0 - Hardware & Software Quality Assurance</div>
  </div>
  <div class="header-right">
    <div class="status-dot disconnected" id="statusDot"></div>
    <span class="status-label" id="statusLabel">Disconnected</span>
    <button class="btn btn-outline btn-small" onclick="exportReport()">Export Report</button>
  </div>
</div>

<div class="container">
  <!-- Config -->
  <div class="config-bar">
    <label>API URL:</label>
    <input type="text" id="apiUrl" value="http://localhost:3001" onchange="checkConnection()">
    <button class="btn btn-outline btn-small" onclick="checkConnection()">Connect</button>
    <div style="flex:1"></div>
    <button class="btn btn-run" id="runAllBtn" onclick="runAllTests()" disabled>Run All Tests</button>
    <button class="btn btn-stop btn-small" id="stopBtn" onclick="stopTests()" style="display:none">Stop</button>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="summary-card"><div class="num total" id="sumTotal">0</div><div class="label">Total</div></div>
    <div class="summary-card"><div class="num pass" id="sumPass">0</div><div class="label">Passed</div></div>
    <div class="summary-card"><div class="num fail" id="sumFail">0</div><div class="label">Failed</div></div>
    <div class="summary-card"><div class="num warn" id="sumWarn">0</div><div class="label">Warnings</div></div>
    <div class="summary-card"><div class="num skip" id="sumSkip">0</div><div class="label">Skipped</div></div>
  </div>

  <!-- Progress -->
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- Test Categories -->
  <div id="testCategories"></div>

  <!-- Log -->
  <div class="log-section">
    <div class="log-header">
      <h3>Test Log</h3>
      <button class="btn btn-outline btn-small" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>
</div>

<!-- Report Modal -->
<div class="report-modal" id="reportModal">
  <div class="report-content" id="reportContent"></div>
</div>

<script>
// ============================================================
// Test Definitions
// ============================================================
const TEST_CATEGORIES = [
  {
    id: 'api',
    name: 'API Connectivity',
    icon: '🌐',
    tests: [
      { id: 'api_state', name: 'GET /api/state', desc: 'Verify hardware state endpoint responds', endpoint: '/api/state', method: 'GET', expect: 'chamberTemp' },
      { id: 'api_network', name: 'GET /api/network/status', desc: 'Verify network status endpoint', endpoint: '/api/network/status', method: 'GET', expect: 'connected' },
      { id: 'api_materials', name: 'GET /api/materials/user', desc: 'Verify user materials endpoint', endpoint: '/api/materials/user', method: 'GET', expectArray: true },
      { id: 'api_history', name: 'GET /api/print-history', desc: 'Verify print history endpoint', endpoint: '/api/print-history', method: 'GET', expectArray: true },
      { id: 'ui_served', name: 'UI Served At /', desc: 'GET / returns the built UI page — the fullscreen app (Pi kiosk / Windows desktop window) opens this URL', check: 'ui_served' },
      { id: 'ui_spa_fallback', name: 'SPA Fallback Route', desc: 'GET /settings (a client route, not a file) still returns the UI page, so a refresh inside the kiosk never shows a 404', check: 'ui_spa_fallback' },
      { id: 'ui_fill_scale', name: 'UI Fills Any Screen', desc: 'fitToScreen logic (main.tsx): the 800x480 canvas is stretched to the full viewport — 1280x720 DSI panel, desktop windows, no black margins', check: 'ui_fill_scale' },
      { id: 'ui_builder_size', name: 'Program Builder Fills Screen', desc: 'Build Cure Program dialog (CsvBuilderModal) is 784x464 on the 800x480 canvas — at least 95% of the screen in both axes', check: 'ui_builder_size' },
    ]
  },
  {
    id: 'temperature',
    name: 'Temperature System',
    icon: '🌡',
    tests: [
      { id: 'temp_read', name: 'Temperature Sensor Read', desc: 'Read current chamber temperature', endpoint: '/api/state', method: 'GET', check: 'temp_range' },
      { id: 'temp_set', name: 'Set Target Temperature', desc: 'Set target to 40°C and verify', endpoint: '/api/chamber/temperature?target=40', method: 'POST', check: 'temp_set' },
      { id: 'temp_stop', name: 'Stop Heating', desc: 'Stop heating and verify', endpoint: '/api/chamber/stop', method: 'POST', expect: 'ok' },
      { id: 'temp_ramp_live', name: 'Chamber Temp Reaches Target', desc: 'Command heat to 40°C, then verify /api/state chamberTemp actually rises toward the target — the Cure screen displays and follows this measured value', check: 'temp_ramp_live' },
      { id: 'temp_ramp_logic', name: 'Ramp Ends At Measured Temp', desc: 'Cure screen logic: the ramp keeps going while the measured chamber temp is below target−0.5°C, and the hold timer starts only when it reaches the target', check: 'temp_ramp_logic' },
      { id: 'uv_after_ramp', name: 'UV Waits For Target Temp', desc: 'Cure screen logic: a Cure/Bleacher step that ramps heats FIRST with the UV off; the LEDs turn on only when the measured chamber temp reaches the target', check: 'uv_after_ramp' },
    ]
  },
  {
    id: 'fans',
    name: 'Fan System',
    icon: '💨',
    tests: [
      { id: 'fan_led', name: 'LED Cooling Fan', desc: 'Set LED cooling fan to 50% and verify', endpoint: '/api/fans/led_cooling?speed=50', method: 'POST', expect: 'ok' },
      { id: 'fan_intake', name: 'Chamber Intake Fan', desc: 'Set chamber intake fan to 50%', endpoint: '/api/fans/chamber_intake?speed=50', method: 'POST', expect: 'ok' },
      { id: 'fan_heating', name: 'Chamber Heating Fan', desc: 'Set heating fan to 50%', endpoint: '/api/fans/chamber_heating?speed=50', method: 'POST', expect: 'ok' },
      { id: 'fan_test', name: 'Fan Diagnostic Test', desc: 'Run fan RPM test', endpoint: '/api/diagnostics/fan-test', method: 'POST', check: 'fan_rpm' },
      { id: 'fan_stop', name: 'Stop All Fans', desc: 'Set all fans to 0%', endpoint: '/api/fans/led_cooling?speed=0', method: 'POST', expect: 'ok' },
    ]
  },
  {
    id: 'leds',
    name: 'UV LED System',
    icon: '💡',
    tests: [
      { id: 'led_test', name: 'LED Diagnostic', desc: 'Run full LED diagnostic test', endpoint: '/api/diagnostics/led-test', method: 'POST', check: 'led_results' },
    ]
  },
  {
    id: 'mechanical',
    name: 'Mechanical Systems',
    icon: '⚙',
    tests: [
      { id: 'door_open', name: 'Door Open', desc: 'Open the door', endpoint: '/api/door/open', method: 'POST', expect: 'ok' },
      { id: 'damper_open', name: 'Damper Open', desc: 'Open the damper', endpoint: '/api/damper/open', method: 'POST', expect: 'ok' },
      { id: 'damper_close', name: 'Damper Close', desc: 'Close the damper', endpoint: '/api/damper/close', method: 'POST', expect: 'ok' },
    ]
  },
  {
    id: 'config',
    name: 'Configuration Files',
    icon: '📁',
    tests: [
      { id: 'cfg_presets', name: 'Presets (API)', desc: 'GET /api/materials/presets returns the seeded preset programs (Postgres)', endpoint: '/api/materials/presets', method: 'GET', expectArray: true },
      { id: 'cfg_errors', name: 'Errors JSON', desc: 'Validate errors.json structure', url: '/config/errors.json', check: 'errors' },
      { id: 'cfg_system', name: 'System JSON', desc: 'Validate system.json config', url: '/config/system.json', check: 'system' },
    ]
  },
  {
    id: 'network',
    name: 'Network Diagnostics',
    icon: '📡',
    tests: [
      { id: 'net_ping', name: 'Ping Test (8.8.8.8)', desc: 'Ping Google DNS', endpoint: '/api/network/diagnostics', method: 'POST', body: { tool: 'ping', address: '8.8.8.8' }, expect: 'ok' },
      { id: 'net_dns', name: 'DNS Lookup', desc: 'Resolve google.com', endpoint: '/api/network/diagnostics', method: 'POST', body: { tool: 'nslookup', address: 'google.com' }, expect: 'ok' },
    ]
  },
  {
    id: 'system',
    name: 'System Functions',
    icon: '🖥',
    tests: [
      { id: 'sys_logs', name: 'Export Logs', desc: 'Test log export function', endpoint: '/api/system/export-logs', method: 'POST', expect: 'ok' },
      { id: 'sys_export_csv', name: 'Export CSV to USB', desc: 'CSV export endpoint writes to the connected USB (or reports no-USB)', endpoint: '/api/system/export-csv', method: 'POST', body: { filename: 'qa-test.csv', content: 'Step,Process,Temperature,UVIntensity,CoolingMode\n1,Heating,40,,' }, expect: 'message' },
    ]
  },
  {
    id: 'data_persistence',
    name: 'Data Persistence (PostgreSQL)',
    icon: '🗄',
    tests: [
      { id: 'data_materials_get', name: 'Get User Materials', desc: 'GET /api/materials/user returns user programs (DB view or JSON fallback)', endpoint: '/api/materials/user', method: 'GET', expectArray: true },
      { id: 'data_print_history_get', name: 'Get Print History', desc: 'GET /api/print-history returns print records (§6.4)', endpoint: '/api/print-history', method: 'GET', expectArray: true },
      { id: 'data_cure_history_get', name: 'Get Cure History', desc: 'GET /api/cure-history returns cure runs (§8) — empty [] without a DB', endpoint: '/api/cure-history', method: 'GET', expectArray: true },
      { id: 'data_cure_start', name: 'Start Cure Run (DB)', desc: 'POST /api/cure-runs/qa-test-run/start records a run — needs DATABASE_URL (503 otherwise)', endpoint: '/api/cure-runs/qa-test-run/start', method: 'POST', body: { materialName: 'QA Material', steps: 2, phases: ['Heating', 'Cooling'], targetTemp: 60, serialNumber: 'QA-BOX-001' }, expect: 'ok' },
      { id: 'data_telemetry', name: 'Record Telemetry (DB)', desc: 'POST /api/cure-runs/qa-test-run/telemetry appends a sample to cure_run_telemetry', endpoint: '/api/cure-runs/qa-test-run/telemetry', method: 'POST', body: { t: 5, chamberTemp: 42.5, uvOn: false }, expect: 'ok' },
      { id: 'data_cure_finish', name: 'Finish Cure Run (DB)', desc: 'POST /api/cure-runs/qa-test-run/finish closes the run', endpoint: '/api/cure-runs/qa-test-run/finish', method: 'POST', body: { status: 'completed', stepsCompleted: 2 }, expect: 'ok' },
      { id: 'data_report_save', name: 'Save Cure Report (DB)', desc: 'POST /api/cure-runs/qa-test-run/report persists the report to cure_reports', endpoint: '/api/cure-runs/qa-test-run/report', method: 'POST', body: { content: '<html>QA report</html>', summary: { materialName: 'QA Material', status: 'completed' }, format: 'html' }, expect: 'ok' },
      { id: 'data_report_get', name: 'Fetch Cure Report (DB)', desc: 'GET /api/cure-runs/qa-test-run/report returns the saved report', endpoint: '/api/cure-runs/qa-test-run/report', method: 'GET', expect: 'ok' },
    ]
  },
  {
    id: 'cure_ops',
    name: 'Cure Operation Functions',
    icon: '🔥',
    tests: [
      { id: 'op_heat', name: 'Heat to Target', desc: 'heat_to_target_temperature(60)', endpoint: '/api/cure/heat?target=60', method: 'POST', expect: 'ok' },
      { id: 'op_dry', name: 'Dry to Target', desc: 'dry_to_target_temperature(50)', endpoint: '/api/cure/dry?target=50', method: 'POST', expect: 'ok' },
      { id: 'op_cure405', name: 'Cure UV 405nm', desc: 'cure_uv_405(target 60, intensity 30%)', endpoint: '/api/cure/cure-405?target=60&intensity=30', method: 'POST', expect: 'ok' },
      { id: 'op_cure450', name: 'Bleaching UV 450nm', desc: 'cure_uv_450(target 60, intensity 40%)', endpoint: '/api/cure/cure-450?target=60&intensity=40', method: 'POST', expect: 'ok' },
      { id: 'op_cool', name: 'Cool to Target', desc: 'cool_to_target_temperature(25, medium)', endpoint: '/api/cure/cool?target=25&mode=medium', method: 'POST', expect: 'ok' },
      { id: 'op_stop', name: 'Stop All Outputs', desc: 'stop_all() turns off heater / UV / cooling', endpoint: '/api/cure/stop', method: 'POST', expect: 'ok' },
      { id: 'op_bad_temp', name: 'Reject Bad Temp', desc: 'Heat with target 99°C is rejected (30-80)', endpoint: '/api/cure/heat?target=99', method: 'POST', check: 'hw_reject', code: 7001 },
      { id: 'op_bad_mode', name: 'Reject Bad Cooling Mode', desc: 'Cool with mode=turbo is rejected', endpoint: '/api/cure/cool?target=25&mode=turbo', method: 'POST', check: 'hw_reject', code: 7003 },
    ]
  },
  {
    id: 'io_integration',
    name: 'IO Board Integration (io_controller)',
    icon: '🔌',
    tests: [
      { id: 'io_state_source', name: 'Hardware Source', desc: 'GET /api/state reports the driving layer: real IO board (io_controller) or simulation', endpoint: '/api/state', method: 'GET', check: 'io_hw_source' },
      { id: 'io_door_state', name: 'Door Interlock Read', desc: 'GET /api/state reads the door sensor (GPIO27) — doorClosed must be present', endpoint: '/api/state', method: 'GET', check: 'io_door' },
      { id: 'io_heat_on', name: 'Heating ON (safety pre-flight)', desc: 'POST /api/cure/heat?target=40 — heater enables only after door-closed, fan spin-up + RPM and thermistor checks', endpoint: '/api/cure/heat?target=40', method: 'POST', expect: 'ok' },
      { id: 'io_heat_state', name: 'Heating State Reflected', desc: 'GET /api/state shows isHeating + target after the heat command', endpoint: '/api/state', method: 'GET', check: 'io_heating_on' },
      { id: 'io_uv_405', name: 'UV 405nm ON (Cure)', desc: 'POST /api/cure/cure-405 — wavelength routing (GPIO17) verified, 405nm LEDs + their fans start', endpoint: '/api/cure/cure-405?target=40&intensity=30', method: 'POST', expect: 'ok' },
      { id: 'io_uv_state', name: 'UV State Reflected', desc: 'GET /api/state shows uvOn with wavelength 405', endpoint: '/api/state', method: 'GET', check: 'io_uv_on' },
      { id: 'io_uv_450', name: 'UV 450nm ON (Bleaching)', desc: 'POST /api/cure/cure-450 — switches wavelength mode safely (all LEDs off first)', endpoint: '/api/cure/cure-450?target=40&intensity=30', method: 'POST', expect: 'ok' },
      { id: 'io_cool_on', name: 'Cooling Mode ON', desc: 'POST /api/cure/cool — damper opens, fans run under closed-loop rate control', endpoint: '/api/cure/cool?target=25&mode=medium', method: 'POST', expect: 'ok' },
      { id: 'io_stop', name: 'Stop All Outputs', desc: 'POST /api/cure/stop turns heater + UV + cooling off through the safety layer', endpoint: '/api/cure/stop', method: 'POST', expect: 'ok' },
      { id: 'io_stop_state', name: 'Outputs Off Reflected', desc: 'GET /api/state shows UV and cooling off after stop', endpoint: '/api/state', method: 'GET', check: 'io_all_off' },
      { id: 'io_rgb_status', name: 'RGB Status Strip Logic', desc: 'StatusLeds (io_bridge): any fault → BLINKING red beats door-open; open door → BLINKING door color; process running (heat/cool/UV) → yellow comet moving right-to-left; all OK → solid normal color; unreadable door sensor is not treated as open', check: 'io_rgb_status' },
    ]
  },
  {
    id: 'program_validation',
    name: 'Program Validation (Cure Builder)',
    icon: '📋',
    tests: [
      { id: 'pv_empty_name', name: 'Empty Name Blocked', desc: 'Program without a name cannot be saved', check: 'pv_empty_name' },
      { id: 'pv_no_steps', name: 'No Steps Blocked', desc: 'Program with zero steps cannot be saved', check: 'pv_no_steps' },
      { id: 'pv_valid_simple', name: 'Simple Valid Program', desc: 'Heating → Cooling program passes validation', check: 'pv_valid_simple' },
      { id: 'pv_n2_no_process', name: 'N₂ Without Cure/Bleach After', desc: 'N₂ without Cure/Bleaching after it is blocked', check: 'pv_n2_no_process' },
      { id: 'pv_n2_with_heating', name: 'N₂ + Heating Blocked', desc: 'Heating directly after N₂ is blocked (only Cure/Bleaching allowed)', check: 'pv_n2_with_heating' },
      { id: 'pv_n2_with_cure', name: 'N₂ + Cure Passes', desc: 'N₂ followed by Cure passes the process check', check: 'pv_n2_with_cure' },
      { id: 'pv_n2_with_bleacher', name: 'N₂ + Bleaching Passes', desc: 'N₂ followed by Bleaching passes the process check', check: 'pv_n2_with_bleacher' },
      { id: 'pv_n2_no_cooling', name: 'N₂ + Cure But No Cooling', desc: 'N₂ → Cure with no Cooling step after is blocked', check: 'pv_n2_no_cooling' },
      { id: 'pv_n2_with_cooling', name: 'N₂ + Cure + Cooling Passes', desc: 'N₂ → Cure → Cooling passes all validations', check: 'pv_n2_with_cooling' },

// ============================================================
// State
// ============================================================
let isConnected = false;
let isRunning = false;
let shouldStop = false;
let testResults = {};
let logLines = [];
let startTime = null;

// ============================================================
// Init
// ============================================================
function init() {
  renderCategories();
  checkConnection();
}

// ============================================================
// Connection
// ============================================================
async function checkConnection() {
  const url = document.getElementById('apiUrl').value;
  const dot = document.getElementById('statusDot');
  const label = document.getElementById('statusLabel');
  const btn = document.getElementById('runAllBtn');

  try {
    const res = await fetch(url + '/api/state', { signal: AbortSignal.timeout(3000) });
    if (res.ok) {
      isConnected = true;
      dot.className = 'status-dot connected';
      label.textContent = 'Connected';
      btn.disabled = false;
      log('info', 'Connected to API at ' + url);
    } else {
      throw new Error('Bad response');
    }
  } catch (e) {
    isConnected = false;
    dot.className = 'status-dot disconnected';
    label.textContent = 'Disconnected';
    btn.disabled = true;
    log('fail', 'Cannot connect to API at ' + url);
  }
}

// ============================================================
// Render
// ============================================================
function renderCategories() {
  const container = document.getElementById('testCategories');
  let totalTests = 0;

  container.innerHTML = TEST_CATEGORIES.map(cat => {
    totalTests += cat.tests.length;
    return `
    <div class="category open" id="cat-${cat.id}">
      <div class="category-header" onclick="toggleCategory('${cat.id}')">
        <h3><span class="cat-icon">${cat.icon}</span> ${cat.name}</h3>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="cat-stats" id="cat-stats-${cat.id}">${cat.tests.length} tests</span>
          <button class="btn btn-outline btn-small" onclick="event.stopPropagation();runCategory('${cat.id}')">Run</button>
          <span class="expand">&#9660;</span>
        </div>
      </div>
      <div class="test-list">
        ${cat.tests.map(t => `
          <div class="test-row" id="row-${t.id}">
            <div class="test-status pending" id="status-${t.id}">-</div>
            <div class="test-info">
              <div class="test-name">${t.name}</div>
              <div class="test-desc">${t.desc}</div>
            </div>
            <div class="test-result" id="result-${t.id}"></div>
            <div class="test-time" id="time-${t.id}"></div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('sumTotal').textContent = totalTests;
}

function toggleCategory(id) {
  document.getElementById('cat-' + id).classList.toggle('open');
}

function updateSummary() {
  const values = Object.values(testResults);
  const pass = values.filter(r => r === 'pass').length;
  const fail = values.filter(r => r === 'fail').length;
  const warn = values.filter(r => r === 'warn').length;
  const skip = values.filter(r => r === 'skip').length;
  const total = TEST_CATEGORIES.reduce((s, c) => s + c.tests.length, 0);

  document.getElementById('sumPass').textContent = pass;
  document.getElementById('sumFail').textContent = fail;
  document.getElementById('sumWarn').textContent = warn;
  document.getElementById('sumSkip').textContent = skip;

  const done = pass + fail + warn + skip;
  document.getElementById('progressFill').style.width = Math.round((done / total) * 100) + '%';

  // Update category stats
  TEST_CATEGORIES.forEach(cat => {
    const catResults = cat.tests.map(t => testResults[t.id]).filter(Boolean);
    const catPass = catResults.filter(r => r === 'pass').length;
    const catFail = catResults.filter(r => r === 'fail').length;
    const el = document.getElementById('cat-stats-' + cat.id);
    if (catResults.length === 0) {
      el.textContent = cat.tests.length + ' tests';
    } else {
      el.innerHTML = `<span style="color:#4caf50">${catPass}P</span> / <span style="color:#f44336">${catFail}F</span> / ${cat.tests.length}`;
    }
  });
}

function setTestStatus(testId, status, result, time) {
  testResults[testId] = status;

  const statusEl = document.getElementById('status-' + testId);
  const resultEl = document.getElementById('result-' + testId);
  const timeEl = document.getElementById('time-' + testId);
  const rowEl = document.getElementById('row-' + testId);

  const icons = { pending: '-', running: '...', pass: '✓', fail: '✗', warn: '!', skip: '—' };
  statusEl.className = 'test-status ' + status;
  statusEl.textContent = icons[status] || '-';
  resultEl.textContent = result || '';
  resultEl.className = 'test-result ' + status;
  timeEl.textContent = time ? time + 'ms' : '';
  rowEl.className = 'test-row' + (status === 'running' ? ' running' : '');

  updateSummary();
}
