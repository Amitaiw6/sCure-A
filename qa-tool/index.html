// Test Runner
// ============================================================
async function runAllTests() {
  if (isRunning) return;
  isRunning = true;
  shouldStop = false;
  startTime = Date.now();

  document.getElementById('runAllBtn').disabled = true;
  document.getElementById('stopBtn').style.display = '';

  // Reset all
  testResults = {};
  TEST_CATEGORIES.forEach(cat => cat.tests.forEach(t => setTestStatus(t.id, 'pending', '', '')));
  updateSummary();

  log('info', '=== QA Test Run Started ===');

  for (const cat of TEST_CATEGORIES) {
    if (shouldStop) break;
    log('info', `--- ${cat.name} ---`);
    for (const test of cat.tests) {
      if (shouldStop) { setTestStatus(test.id, 'skip', 'Stopped', ''); continue; }
      await runSingleTest(test);
    }
  }

  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  const vals = Object.values(testResults);
  const pass = vals.filter(r => r === 'pass').length;
  const fail = vals.filter(r => r === 'fail').length;
  log(fail > 0 ? 'fail' : 'pass', `=== QA Complete: ${pass} passed, ${fail} failed in ${elapsed}s ===`);

  isRunning = false;
  document.getElementById('runAllBtn').disabled = false;
  document.getElementById('stopBtn').style.display = 'none';
}

async function runCategory(catId) {
  const cat = TEST_CATEGORIES.find(c => c.id === catId);
  if (!cat || isRunning) return;
  isRunning = true;
  shouldStop = false;

  log('info', `--- Running: ${cat.name} ---`);
  for (const test of cat.tests) {
    if (shouldStop) break;
    await runSingleTest(test);
  }
  isRunning = false;
}

function stopTests() {
  shouldStop = true;
  log('warn', 'Test run stopped by user');
}

async function runSingleTest(test) {
  setTestStatus(test.id, 'running', 'Running...', '');
  const t0 = Date.now();
  const apiUrl = document.getElementById('apiUrl').value;

  try {
    // Local validation tests (no API needed)
    if (test.check && test.check.startsWith('csv_')) {
      const result = runCsvImportCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }
    if (test.check && test.check.startsWith('fmt_')) {
      const result = runCsvFormatCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }
    if (test.check && test.check.startsWith('pv_')) {
      const result = runProgramValidationCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }
    if (test.check && test.check.startsWith('dup_')) {
      const result = runDuplicateCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }
    if (test.check && test.check.startsWith('nav_')) {
      const result = runNavCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }
    if (test.check && test.check.startsWith('n2_')) {
      const result = runN2IconCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }
    if (test.check && test.check.startsWith('fav_')) {
      const result = runFavoriteCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }
    if (test.check && test.check.startsWith('gv_')) {
      const result = runGaugeValueCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }
    if (test.check && test.check.startsWith('fant_')) {
      const result = runFanTestCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }
    if (test.check && test.check.startsWith('srs_')) {
      const result = runSrsVersionCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }
    if (test.check && test.check.startsWith('boot_')) {
      const result = runBootCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }
    if (test.check && test.check.startsWith('wake_')) {
      const result = runWakeScreenCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }
    if (test.check && test.check.startsWith('cra_')) {
      const result = await runComplianceCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }

    // Local UX↔hardware compatibility logic mirrors (no API needed)
    if (test.check && test.check.startsWith('hwc_csv_') || test.check === 'hwc_cool_done_band' || test.check === 'hwc_deltasigma') {
      const result = runHwCompatCheck(test.check);
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }

    // Negative API test: the endpoint must REJECT the request (ok:false),
    // optionally with a specific registry error code.
    if (test.check === 'hw_reject') {
      const opts = { method: test.method || 'POST', signal: AbortSignal.timeout(8000) };
      if (test.body) { opts.headers = { 'Content-Type': 'application/json' }; opts.body = JSON.stringify(test.body); }
      const r = await fetch(apiUrl + test.endpoint, opts);
      const d = await r.json();
      const elapsed = Date.now() - t0;
      let result;
      if (d.ok === false && (!test.code || d.code === test.code)) {
        result = { status: 'pass', msg: `Rejected${d.code ? ' with code ' + d.code : ''}: ${(d.message || '').slice(0, 40)}` };
      } else if (d.ok === false) {
        result = { status: 'warn', msg: `Rejected but code=${d.code ?? 'none'} (expected ${test.code})` };
      } else {
        result = { status: 'fail', msg: 'Request was ACCEPTED but must be rejected' };
      }
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r2 => setTimeout(r2, 50));
      return;
    }

    // Fullscreen launch prerequisite: the API server must serve the built
    // UI at / (and at any client route) — the Pi kiosk and the Windows
    // desktop window (server/desktop.py) both open http://localhost:3001.
    if (test.check === 'ui_served' || test.check === 'ui_spa_fallback') {
      const path = test.check === 'ui_served' ? '/' : '/settings';
      let result;
      try {
        const r = await fetch(apiUrl + path, { signal: AbortSignal.timeout(5000) });
        const body = await r.text();
        if (!r.ok) result = { status: 'fail', msg: `GET ${path} returned HTTP ${r.status}` };
        else if (!body.includes('id="root"')) result = { status: 'fail', msg: `GET ${path} did not return the UI page (no root element)` };
        else result = { status: 'pass', msg: `GET ${path} serves the UI page` };
      } catch (e) {
        result = { status: 'fail', msg: `GET ${path} failed: ${e.message}` };
      }
      const elapsed = Date.now() - t0;
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }

    // Mirrors StatusLeds in server/io_bridge.py: the RGB strip shows machine
    // status — fault (blink red) > door open (blink) > busy (yellow comet
    // moving right-to-left while heating/cooling/UV run) > normal (solid).
    // door_open === null (unreadable sensor) is NOT "open".
    if (test.check === 'io_rgb_status') {
      const mode = (fault, doorOpen, busy) =>
        fault ? 'fault' : (doorOpen === true ? 'door' : (busy ? 'busy' : 'normal'));
      const frame = (m, phase, colors) =>
        m === 'fault' ? (phase ? colors.fault : 'off')
        : m === 'door' ? (phase ? colors.door : 'off')
        : m === 'busy' ? 'comet'
        : colors.normal;
      const C = { normal: 'green', fault: 'red', door: 'orange' };
      const cases = [
        // [fault, doorOpen, busy] -> expected mode
        [null, false, false, 'normal'],       // all OK -> solid normal color
        [null, true, false, 'door'],          // door open -> door blink
        ['heater fan', true, true, 'fault'],  // fault beats door and busy
        [null, true, true, 'door'],           // door beats busy
        [null, false, true, 'busy'],          // process running -> moving yellow
        [null, null, false, 'normal'],        // unreadable sensor stays normal
      ];
      const bad = cases.filter(([f, d, bz, expect]) => mode(f, d, bz) !== expect);
      // Comet frame: head at n-1-offset moves right-to-left, tail fades behind
      const cometHead = (n, offset) => (n - 1 - offset) % n;
      const chaseOk = cometHead(21, 0) === 20 && cometHead(21, 1) === 19 && cometHead(21, 21) === 20;
      const blinkOk =
        frame('fault', true, C) === 'red' && frame('fault', false, C) === 'off' &&   // fault blinks
        frame('door', true, C) === 'orange' && frame('door', false, C) === 'off' &&  // door blinks
        frame('busy', true, C) === 'comet' && frame('busy', false, C) === 'comet' && // busy always animates
        frame('normal', true, C) === 'green' && frame('normal', false, C) === 'green'; // normal solid
      const elapsed = Date.now() - t0;
      const result = bad.length === 0 && blinkOk && chaseOk
        ? { status: 'pass', msg: 'fault > door > busy > normal priority; blink + right-to-left comet correct' }
        : { status: 'fail', msg: bad.length ? `wrong mode for: ${bad.map(c => `fault=${c[0]},door=${c[1]},busy=${c[2]}`).join('; ')}` : (!chaseOk ? 'comet direction wrong' : 'blink pattern wrong') };
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }

    // Mirrors CureProcessPage: during a cure/bleacher ramp only the heater
    // runs (deferUv); the UV command is sent when chamberTemp >= target-0.5.
    if (test.check === 'uv_after_ramp') {
      const uvAllowed = (chamberTemp, target, ramping) => !ramping || chamberTemp >= target - 0.5;
      const deferUv = (stepTemp, chamberTemp) => stepTemp != null && stepTemp > chamberTemp;
      const cases = [
        // [stepTemp, chamberTemp at start] -> UV deferred?
        [45, 25, true],    // cold chamber: heat first, UV waits
        [45, 44.8, false], // already at target: UV allowed immediately
        [null, 30, false], // no temperature on the step: UV immediately
      ];
      const bad = cases.filter(([t, c, expect]) => deferUv(t, c) !== expect);
      const gateOk = uvAllowed(44.5, 45, true) && !uvAllowed(44.4, 45, true) && uvAllowed(20, 45, false);
      const elapsed = Date.now() - t0;
      const result = bad.length === 0 && gateOk
        ? { status: 'pass', msg: 'UV stays off during the ramp and turns on at the target temperature' }
        : { status: 'fail', msg: `wrong UV gating for: ${bad.map(c => `step ${c[0]}°C @ ${c[1]}°C`).join(', ') || 'threshold check'}` };
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }

    // Mirrors CsvBuilderModal: the Build Cure Program dialog must cover at
    // least 95% of the 800x480 design canvas in both axes (screen proportions).
    if (test.check === 'ui_builder_size') {
      const DIALOG = { w: 784, h: 464 }, CANVAS = { w: 800, h: 480 };
      const wOk = DIALOG.w / CANVAS.w >= 0.95, hOk = DIALOG.h / CANVAS.h >= 0.95;
      const elapsed = Date.now() - t0;
      const result = wOk && hOk
        ? { status: 'pass', msg: `dialog ${DIALOG.w}x${DIALOG.h} covers ${Math.round(DIALOG.w / CANVAS.w * 100)}% x ${Math.round(DIALOG.h / CANVAS.h * 100)}% of the screen` }
        : { status: 'fail', msg: `dialog ${DIALOG.w}x${DIALOG.h} leaves too much margin on the ${!wOk ? 'width' : 'height'}` };
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }

    // Mirrors fitToScreen() in main.tsx: the fixed 800x480 design canvas is
    // scaled to fill the whole viewport, on every screen of the app at once.
    if (test.check === 'ui_fill_scale') {
      const fit = (w, h) => `${w / 800} ${h / 480}`;
      const cases = [
        [1280, 720, '1.6 1.5'],    // the device's DSI panel (720x1280 rotated)
        [800, 480, '1 1'],         // native design size
        [1920, 1080, '2.4 2.25'],  // Windows desktop fullscreen
      ];
      const bad = cases.filter(([w, h, expect]) => fit(w, h) !== expect);
      const elapsed = Date.now() - t0;
      const result = bad.length === 0
        ? { status: 'pass', msg: `${cases.length} viewports stretch to full screen (no black margins)` }
        : { status: 'fail', msg: `wrong scale for: ${bad.map(c => `${c[0]}x${c[1]}`).join(', ')}` };
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }

    // Live chamber-temperature ramp: after a heat command, /api/state
    // chamberTemp must move toward the target (real thermistor on the Pi,
    // thermal simulation off-board). This is the value the Cure screen shows.
    if (test.check === 'temp_ramp_live') {
      const readState = async () => {
        const r = await fetch(apiUrl + '/api/state', { signal: AbortSignal.timeout(5000) });
        return r.json();
      };
      const before = await readState();
      const cmdRes = await fetch(apiUrl + '/api/cure/heat?target=40', { method: 'POST', signal: AbortSignal.timeout(5000) });
      const cmd = await cmdRes.json();
      if (!cmd.ok) {
        const elapsed = Date.now() - t0;
        setTestStatus(test.id, 'warn', `Heat command refused: ${cmd.message || 'unknown'}`, elapsed);
        log('warn', `${test.name}: heat command refused (${cmd.message || 'unknown'})`);
        return;
      }
      setTestStatus(test.id, 'running', 'Heating — sampling for 8s...', '');
      await new Promise(r => setTimeout(r, 8000));
      const after = await readState();
      await fetch(apiUrl + '/api/cure/stop', { method: 'POST', signal: AbortSignal.timeout(5000) }).catch(() => {});
      const elapsed = Date.now() - t0;
      const b = before.chamberTemp, a = after.chamberTemp;
      let result;
      if (typeof a !== 'number') result = { status: 'fail', msg: 'No chamberTemp in /api/state' };
      else if (a >= 39.5) result = { status: 'pass', msg: `At target: ${a}°C` };
      else if (a - b >= 0.3) result = { status: 'pass', msg: `${b}°C → ${a}°C (rising toward 40°C)` };
      else result = { status: 'fail', msg: `chamberTemp not moving toward target: ${b}°C → ${a}°C` };
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 100));
      return;
    }

    // Cure screen ramp logic (mirrors CureProcessPage.tick with real hardware):
    // the ramp ends ONLY when the measured chamber temperature reaches
    // target - 0.5, never on a timer.
    if (test.check === 'temp_ramp_logic') {
      const rampState = (chamberTemp, targetTemp) => chamberTemp >= targetTemp - 0.5 ? 'hold' : 'ramping';
      const cases = [
        [25, 45, 'ramping'], [44.4, 45, 'ramping'], [44.5, 45, 'hold'],
        [45, 45, 'hold'], [47, 45, 'hold'], [26, 80, 'ramping'],
      ];
      const bad = cases.filter(([temp, target, expect]) => rampState(temp, target) !== expect);
      const elapsed = Date.now() - t0;
      const result = bad.length === 0
        ? { status: 'pass', msg: `${cases.length} ramp/hold transitions follow the measured temp` }
        : { status: 'fail', msg: `${bad.length} wrong transition(s): ${bad.map(c => `${c[0]}°C→${c[1]}°C`).join(', ')}` };
      setTestStatus(test.id, result.status, result.msg, elapsed);
      log(result.status, `${test.name}: ${result.msg} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 50));
      return;
    }

    // Performance tests with special logic
    if (test.check === 'perf_latency') {
      const times = [];
      for (let i = 0; i < (test.iterations || 10); i++) {
        const s = Date.now();
        await fetch(apiUrl + test.endpoint, { signal: AbortSignal.timeout(5000) });
        times.push(Date.now() - s);
        setTestStatus(test.id, 'running', `${i + 1}/${test.iterations}...`, '');
      }
      const avg = Math.round(times.reduce((a, b) => a + b, 0) / times.length);
      const max = Math.max(...times);
      const min = Math.min(...times);
      const elapsed = Date.now() - t0;
      const status = avg < 100 ? 'pass' : avg < 300 ? 'warn' : 'fail';
      setTestStatus(test.id, status, `avg ${avg}ms (min ${min}, max ${max})`, elapsed);
      log(status, `${test.name}: avg=${avg}ms min=${min}ms max=${max}ms (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 100));
      return;
    }

    if (test.check === 'perf_burst') {
      const n = test.iterations || 20;
      const s = Date.now();
      const promises = Array.from({ length: n }, () =>
        fetch(apiUrl + test.endpoint, { signal: AbortSignal.timeout(10000) }).then(r => r.ok)
      );
      const results = await Promise.all(promises);
      const elapsed = Date.now() - s;
      const ok = results.filter(Boolean).length;
      const status = ok === n ? 'pass' : ok > n * 0.8 ? 'warn' : 'fail';
      setTestStatus(test.id, status, `${ok}/${n} OK in ${elapsed}ms`, elapsed);
      log(status, `${test.name}: ${ok}/${n} succeeded in ${elapsed}ms`);
      await new Promise(r => setTimeout(r, 100));
      return;
    }

    if (test.check === 'perf_multi_load') {
      const s = Date.now();
      const [presetsRes, userRes] = await Promise.all([
        fetch(apiUrl + '/api/materials/presets', { signal: AbortSignal.timeout(5000) }).then(r => r.json()).catch(() => []),
        fetch(apiUrl + '/api/materials/user', { signal: AbortSignal.timeout(5000) }).then(r => r.json()).catch(() => []),
      ]);
      const elapsed = Date.now() - s;
      const total = presetsRes.length + userRes.length;
      const status = elapsed < 500 ? 'pass' : elapsed < 1500 ? 'warn' : 'fail';
      setTestStatus(test.id, status, `${total} materials in ${elapsed}ms`, elapsed);
      log(status, `${test.name}: ${presetsRes.length} presets + ${userRes.length} user = ${total} (${elapsed}ms)`);
      await new Promise(r => setTimeout(r, 100));
      return;
    }

    if (test.check === 'perf_simple') {
      const opts = { method: test.method, signal: AbortSignal.timeout(5000) };
      const res = await fetch(apiUrl + test.endpoint, opts);
      const data = await res.json();
      const elapsed = Date.now() - t0;
      const status = data.ok ? (elapsed < 200 ? 'pass' : elapsed < 500 ? 'warn' : 'fail') : 'fail';
      setTestStatus(test.id, status, `${elapsed}ms response`, elapsed);
      log(status, `${test.name}: ${elapsed}ms (${data.ok ? 'OK' : 'FAIL'})`);
      await new Promise(r => setTimeout(r, 100));
      return;
    }

    // Standard tests
    let res, data;

    if (test.url) {
      res = await fetch(test.url, { signal: AbortSignal.timeout(5000) });
      data = await res.json();
    } else {
      const opts = { method: test.method, signal: AbortSignal.timeout(10000) };
      if (test.body) {
        opts.headers = { 'Content-Type': 'application/json' };
        opts.body = JSON.stringify(test.body);
      }
      res = await fetch(apiUrl + test.endpoint, opts);
      data = await res.json();
    }

    const elapsed = Date.now() - t0;

    // Check result
    if (test.expect === 'ok' && data.ok) {
      setTestStatus(test.id, 'pass', data.message || 'OK', elapsed);
      log('pass', `${test.name}: OK (${elapsed}ms)`);
    } else if (test.expect && data[test.expect] !== undefined) {
      setTestStatus(test.id, 'pass', JSON.stringify(data[test.expect]).slice(0, 50), elapsed);
      log('pass', `${test.name}: ${test.expect} = ${JSON.stringify(data[test.expect]).slice(0, 40)} (${elapsed}ms)`);
    } else if (test.expectArray && Array.isArray(data)) {
      setTestStatus(test.id, 'pass', `${data.length} items`, elapsed);
      log('pass', `${test.name}: ${data.length} items (${elapsed}ms)`);
    } else if (test.check) {
      const checkResult = runCheck(test.check, data);
      setTestStatus(test.id, checkResult.status, checkResult.msg, elapsed);
      log(checkResult.status, `${test.name}: ${checkResult.msg} (${elapsed}ms)`);
    } else {
      setTestStatus(test.id, 'warn', 'Unexpected response', elapsed);
      log('warn', `${test.name}: Unexpected response`);
    }
  } catch (e) {
    const elapsed = Date.now() - t0;
    setTestStatus(test.id, 'fail', e.message, elapsed);
    log('fail', `${test.name}: ${e.message} (${elapsed}ms)`);
  }

  // Small delay between tests
  await new Promise(r => setTimeout(r, 100));
}

function runCheck(check, data) {
  switch (check) {
    case 'hwc_n2_state': {
      if (typeof data.nitrogenActive !== 'boolean') return { status: 'fail', msg: 'No nitrogenActive in /api/state' };
      return data.nitrogenActive
        ? { status: 'pass', msg: 'nitrogenActive = true after valve open' }
        : { status: 'warn', msg: 'nitrogenActive is false (valve command may have been refused off-Pi)' };
    }
    case 'hwc_state_extras': {
      const missing = ['ledTemps', 'fanRpm', 'nitrogenActive', 'faults'].filter(k => data[k] === undefined);
      if (missing.length > 0) return { status: 'fail', msg: `Missing state fields: ${missing.join(', ')}` };
      return { status: 'pass', msg: `hwSource=${data.hwSource}: ledTemps/fanRpm/nitrogenActive/faults all present` };
    }
    case 'temp_range': {
      const temp = data.chamberTemp;
      if (typeof temp !== 'number') return { status: 'fail', msg: 'No temperature data' };
      if (temp < -10 || temp > 120) return { status: 'fail', msg: `Out of range: ${temp}°C` };
      if (temp < 15 || temp > 85) return { status: 'warn', msg: `Unusual: ${temp}°C` };
      return { status: 'pass', msg: `${temp}°C` };
    }
    case 'temp_set':
      return data.ok ? { status: 'pass', msg: 'Target set to 40°C' } : { status: 'fail', msg: 'Failed to set target' };
    case 'fan_rpm': {
      const rpm = data.rpm;
      if (!rpm) return { status: 'fail', msg: 'No RPM data' };
      if (rpm < 1000) return { status: 'fail', msg: `Low RPM: ${rpm}` };
      if (rpm < 2000) return { status: 'warn', msg: `${rpm} RPM (low)` };
      return { status: 'pass', msg: `${rpm} RPM` };
    }
    case 'led_results': {
      const results = data.results;
      if (!results || !Array.isArray(results)) return { status: 'fail', msg: 'No LED data' };
      const failed = results.filter(r => r.status !== 'OK');
      if (failed.length > 0) return { status: 'fail', msg: `${failed.length} LED(s) failed` };
      return { status: 'pass', msg: `${results.length} LEDs OK` };
    }
    case 'presets': {
      if (!Array.isArray(data)) return { status: 'fail', msg: 'Not an array' };
      if (data.length === 0) return { status: 'warn', msg: 'No presets found' };
      const valid = data.every(m => m.name && Array.isArray(m.steps) && m.steps.length > 0);
      if (!valid) return { status: 'fail', msg: 'Invalid preset structure' };
      return { status: 'pass', msg: `${data.length} presets loaded` };
    }
    case 'errors': {
      if (!data.errors || !Array.isArray(data.errors)) return { status: 'fail', msg: 'No errors array' };
      const critical = data.errors.filter(e => e.severity === 'critical').length;
      const warnings = data.errors.filter(e => e.severity === 'warning').length;
      return { status: 'pass', msg: `${critical} errors, ${warnings} warnings` };
    }
    case 'system': {
      if (!data.serialNumber) return { status: 'fail', msg: 'No serial number' };
      return { status: 'pass', msg: `S/N: ${data.serialNumber}` };
    }
    // --- IO Board Integration (io_controller bridge) ---
    case 'io_hw_source': {
      if (data.hwSource === 'io_controller') return { status: 'pass', msg: 'Real IO board (io_controller)' };
      return { status: 'warn', msg: `Simulation mode (hwSource: ${data.hwSource || 'none'})` };
    }
    case 'io_door': {
      if (typeof data.doorClosed !== 'boolean') return { status: 'fail', msg: 'No doorClosed in state' };
      return { status: 'pass', msg: data.doorClosed ? 'Door CLOSED' : 'Door OPEN' };
    }
    case 'io_heating_on': {
      if (data.hwSource !== 'io_controller') return { status: 'warn', msg: 'Simulation — not read from hardware' };
      if (data.isHeating) return { status: 'pass', msg: `Heating, target ${data.targetTemp}°C` };
      return { status: 'fail', msg: (data.faults && data.faults.heater) || 'isHeating = false' };
    }
    case 'io_uv_on': {
      if (data.hwSource !== 'io_controller') return { status: 'warn', msg: 'Simulation — not read from hardware' };
      if (data.uvOn && data.uvWavelength === 405) return { status: 'pass', msg: `UV 405nm ON @ ${data.uvIntensity}%` };
      return { status: 'fail', msg: (data.faults && data.faults.led) || 'UV not on' };
    }
    case 'io_all_off': {
      if (data.uvOn || data.isCooling) return { status: 'fail', msg: 'Outputs still on after stop' };
      return { status: 'pass', msg: 'All outputs off' };
    }
    default: {
      // Program Validation checks (pv_*)
      if (check.startsWith('pv_')) return runProgramValidationCheck(check);
      return { status: 'warn', msg: 'Unknown check' };
    }
  }
}

// ============================================================
// Program Validation Logic (mirrors CsvBuilderModal)
// ============================================================
function validateProgram(name, steps) {
  const hasNitrogen = steps.some(s => s.process === 'Nitrogen');
  const hasCooling = steps.some(s => s.process === 'Cooling');
  const hasCureOrHeating = steps.some(s => s.process === 'Cure' || s.process === 'Bleacher' || s.process === 'Heating');

  // Each N₂ purge must be followed by Cure/Bleaching, then Cooling: N₂ → (Cure|Bleach) → Cooling
  const n2BlockError = (() => {
    for (let i = 0; i < steps.length; i++) {
      if (steps[i].process !== 'Nitrogen') continue;
      const next = steps[i + 1];
      const after = steps[i + 2];
      if (!next || (next.process !== 'Cure' && next.process !== 'Bleacher')) {
        return 'After N₂ purge, add a Cure or Bleaching step';
      }
      if (!after || after.process !== 'Cooling') {
        return 'After the Cure/Bleaching that follows N₂, add a Cooling step';
      }
    }
    return null;
  })();

  if (!name.trim()) return 'Enter a program name';
  if (steps.length === 0) return 'Add at least one step';
  if (!hasCureOrHeating) return 'Program must include a Cure or Heating step';
  if (hasNitrogen && n2BlockError) return n2BlockError;
  return null;
}

// ============================================================
// Compliance Logic (mirrors src/lib/compliance.ts)
// ============================================================
async function sha256HexQA(bytes) {
  const digest = await crypto.subtle.digest('SHA-256', new Uint8Array(bytes));
  return [...new Uint8Array(digest)].map(b => b.toString(16).padStart(2, '0')).join('');
}
function normalizeSha256QA(value) {
  if (typeof value !== 'string') return null;
  const v = value.trim().toLowerCase().replace(/^sha-?256[:=]\s*/, '');
  return /^[0-9a-f]{64}$/.test(v) ? v : null;
}
async function verifyUpdatePackageQA(bytes, expected) {
  const e = normalizeSha256QA(expected);
  if (!e) return { ok: false, reason: 'Missing or malformed checksum' };
  const a = await sha256HexQA(bytes);
  return a === e ? { ok: true, reason: 'Integrity verified' } : { ok: false, reason: 'Checksum mismatch' };
}
// Mirror of REQ-CRA IDs defined in src/lib/compliance.ts
const QA_CRA_REQUIREMENTS = ['REQ-CRA-01','REQ-CRA-02','REQ-CRA-03','REQ-CRA-04','REQ-CRA-05','REQ-CRA-06','REQ-CRA-07','REQ-CRA-08'];

async function runComplianceCheck(check) {
  const enc = new TextEncoder();
  const pkg = enc.encode('scure-update:1.0.1');
  const goodHash = await sha256HexQA(pkg);

  switch (check) {
    case 'cra_verify_pass': {
      const r = await verifyUpdatePackageQA(pkg, goodHash);
      return r.ok ? { status: 'pass', msg: 'Valid package verified' } : { status: 'fail', msg: 'Valid package was rejected: ' + r.reason };
    }
    case 'cra_verify_tamper': {
      const tampered = enc.encode('scure-update:1.0.1-EVIL');
      const r = await verifyUpdatePackageQA(tampered, goodHash);
      return !r.ok ? { status: 'pass', msg: 'Blocked: ' + r.reason } : { status: 'fail', msg: 'Tampered package was NOT blocked' };
    }
    case 'cra_verify_missing_hash': {
      const r = await verifyUpdatePackageQA(pkg, '');
      return !r.ok ? { status: 'pass', msg: 'Blocked: ' + r.reason } : { status: 'fail', msg: 'Missing checksum was NOT blocked' };
    }
    case 'cra_verify_bad_hex': {
      const r = await verifyUpdatePackageQA(pkg, 'zz' + goodHash.slice(2, 40));
      return !r.ok ? { status: 'pass', msg: 'Blocked: ' + r.reason } : { status: 'fail', msg: 'Malformed checksum was NOT blocked' };
    }
    case 'cra_verify_prefix_upper': {
      const r = await verifyUpdatePackageQA(pkg, 'SHA256:' + goodHash.toUpperCase());
      return r.ok ? { status: 'pass', msg: 'Normalized & verified' } : { status: 'fail', msg: 'Prefixed/uppercase digest not accepted' };
    }
    case 'cra_requirements_defined': {
      return QA_CRA_REQUIREMENTS.length === 8
        ? { status: 'pass', msg: '8 REQ-CRA requirements defined' }
        : { status: 'fail', msg: `Expected 8, got ${QA_CRA_REQUIREMENTS.length}` };
    }
    default:
      return { status: 'warn', msg: 'Unknown compliance check' };
  }
}

function runProgramValidationCheck(check) {
  const s = (process, temp, time) => ({ process, temperature: temp ?? null, time: time ?? 10 });

  switch (check) {
    case 'pv_empty_name': {
      const err = validateProgram('', [s('Heating', 40)]);
      return err ? { status: 'pass', msg: 'Blocked: ' + err } : { status: 'fail', msg: 'Should block empty name' };
    }
    case 'pv_no_steps': {
      const err = validateProgram('Test', []);
      return err ? { status: 'pass', msg: 'Blocked: ' + err } : { status: 'fail', msg: 'Should block empty steps' };
    }
    case 'pv_valid_simple': {
      const err = validateProgram('Test', [s('Heating', 40), s('Cooling', 25)]);
      return !err ? { status: 'pass', msg: 'Valid program accepted' } : { status: 'fail', msg: 'Rejected valid program: ' + err };
    }
    case 'pv_n2_no_process': {
      const err = validateProgram('Test', [s('Heating', 40), s('Nitrogen'), s('Cooling', 25)]);
      return err ? { status: 'pass', msg: 'Blocked: ' + err } : { status: 'fail', msg: 'Should block N₂ without process after' };
    }
    case 'pv_n2_with_heating': {
      // New rule: Heating directly after N₂ is NOT allowed — only Cure/Bleaching
      const steps = [s('Heating', 40), s('Nitrogen'), s('Heating', 60), s('Cooling', 25)];
      const err = validateProgram('Test', steps);
      return err ? { status: 'pass', msg: 'Blocked: ' + err } : { status: 'fail', msg: 'Should block Heating after N₂' };
    }
    case 'pv_n2_with_cure': {
      const steps = [s('Heating', 40), s('Nitrogen'), s('Cure', 40), s('Cooling', 25)];
      const err = validateProgram('Test', steps);
      return !err ? { status: 'pass', msg: 'N₂ + Cure accepted' } : { status: 'fail', msg: 'Rejected: ' + err };
    }
    case 'pv_n2_with_bleacher': {
      const steps = [s('Heating', 40), s('Nitrogen'), s('Bleacher', 40), s('Cooling', 25)];
      const err = validateProgram('Test', steps);
      return !err ? { status: 'pass', msg: 'N₂ + Bleaching accepted' } : { status: 'fail', msg: 'Rejected: ' + err };
    }
    case 'pv_n2_no_cooling': {
      // N₂ → Cure with no Cooling after → blocked (must be vented)
      const steps = [s('Heating', 40), s('Nitrogen'), s('Cure', 60)];
      const err = validateProgram('Test', steps);
      return err ? { status: 'pass', msg: 'Blocked: ' + err } : { status: 'fail', msg: 'Should block N₂ without Cooling' };
    }
    case 'pv_n2_with_cooling': {
      const steps = [s('Heating', 40), s('Nitrogen'), s('Cure', 60), s('Cooling', 25)];
      const err = validateProgram('Test', steps);
      return !err ? { status: 'pass', msg: 'Full N₂ flow accepted' } : { status: 'fail', msg: 'Rejected: ' + err };
    }
    case 'pv_n2_cure_cooling': {
      const steps = [s('Heating', 40), s('Nitrogen'), s('Cure', 40), s('Cooling', 25)];
      const err = validateProgram('Test', steps);
      return !err ? { status: 'pass', msg: 'N₂ → Cure → Cooling accepted' } : { status: 'fail', msg: 'Rejected: ' + err };
    }
    case 'pv_only_cooling': {
      const err = validateProgram('Test', [s('Cooling', 25)]);
      return err ? { status: 'pass', msg: 'Blocked: ' + err } : { status: 'fail', msg: 'Should block program without Cure/Heating' };
    }
    case 'pv_n2_drying_after': {
      // Drying directly after N₂ is not allowed
      const steps = [s('Heating', 40), s('Nitrogen'), s('Drying', 50), s('Cure', 60), s('Cooling', 25)];
      const err = validateProgram('Test', steps);
      return err ? { status: 'pass', msg: 'Blocked: ' + err } : { status: 'fail', msg: 'Should block Drying after N₂' };
    }
    case 'pv_n2_cooling_direct': {
      // Cooling directly after N₂ with no Cure/Bleach in between is blocked
      const steps = [s('Cure', 40), s('Nitrogen'), s('Cooling', 25)];
      const err = validateProgram('Test', steps);
      return err ? { status: 'pass', msg: 'Blocked: ' + err } : { status: 'fail', msg: 'Should block Cooling directly after N₂' };
    }
    case 'pv_n2_cure_then_heating': {
      // N₂ → Cure → Heating: the step after the cure must be Cooling, not Heating
      const steps = [s('Heating', 40), s('Nitrogen'), s('Cure', 60), s('Heating', 70), s('Cooling', 25)];
      const err = validateProgram('Test', steps);
      return err ? { status: 'pass', msg: 'Blocked: ' + err } : { status: 'fail', msg: 'Should force Cooling after the N₂ cure' };
    }
    default:
      return { status: 'warn', msg: 'Unknown validation check' };
  }
}

// ============================================================
// Material Duplication Logic (mirrors MaterialContext.duplicateMaterial)
// ============================================================
// Returns the unique "<name> Copy" name given the names already in the list.
function makeCopyName(baseName, existingNames) {
  let copyName = `${baseName} Copy`;
  let n = 2;
  while (existingNames.includes(copyName)) {
    copyName = `${baseName} Copy ${n}`;
    n++;
  }
  return copyName;
}

// Simulates duplicating a material from a list; returns the new material + new list.
function duplicateMaterialSim(list, id) {
  const mat = list.find(m => m.id === id);
  if (!mat) return null;
  const copy = {
    id: 'copy-' + id,
    name: makeCopyName(mat.name, list.map(m => m.name)),
    steps: mat.steps.map(s => ({ ...s })),
    totalDuration: mat.totalDuration,
    isPreset: false,
  };
  const next = [...list, copy];
  return { copy, next };
}

function runDuplicateCheck(check) {
  const baseList = [
    { id: 'a', name: 'ST45', steps: [{ process: 'Heating', temperature: 45, time: 10 }], totalDuration: 10, isPreset: true },
    { id: 'b', name: 'Carbon Fiber', steps: [{ process: 'Heating', temperature: 60, time: 20 }, { process: 'Cooling', temperature: 25, time: 0 }], totalDuration: 20, isPreset: false },
  ];

  switch (check) {
    case 'dup_copy_name': {
      const { copy } = duplicateMaterialSim(baseList, 'a');
      return copy.name === 'ST45 Copy'
        ? { status: 'pass', msg: 'Copy named "ST45 Copy"' }
        : { status: 'fail', msg: `Expected "ST45 Copy", got "${copy.name}"` };
    }
    case 'dup_is_editable': {
      // Duplicating a locked preset must produce an editable (non-preset) material
      const { copy } = duplicateMaterialSim(baseList, 'a');
      return copy.isPreset === false
        ? { status: 'pass', msg: 'Preset copy is editable (isPreset=false)' }
        : { status: 'fail', msg: 'Copy should not be a preset' };
    }
    case 'dup_steps_cloned': {
      const { copy } = duplicateMaterialSim(baseList, 'b');
      const sameContent = JSON.stringify(copy.steps) === JSON.stringify(baseList[1].steps);
      const notSameRef = copy.steps !== baseList[1].steps && copy.steps[0] !== baseList[1].steps[0];
      return sameContent && notSameRef
        ? { status: 'pass', msg: 'Steps deep-copied (content equal, refs distinct)' }
        : { status: 'fail', msg: 'Steps not properly cloned' };
    }
    case 'dup_inserted_after': {
      const { next } = duplicateMaterialSim(baseList, 'a');
      // Copy is appended to the end, alongside new user materials
      return next.length === baseList.length + 1 && next[next.length - 1].name === 'ST45 Copy'
        ? { status: 'pass', msg: 'Copy appended to end of list' }
        : { status: 'fail', msg: 'Copy not appended to end' };
    }
    case 'dup_unique_name': {
      // Duplicating twice must not collide: Copy, then Copy 2
      const first = duplicateMaterialSim(baseList, 'a');
      const second = duplicateMaterialSim(first.next, 'a');
      return first.copy.name === 'ST45 Copy' && second.copy.name === 'ST45 Copy 2'
        ? { status: 'pass', msg: 'Second copy named "ST45 Copy 2"' }
        : { status: 'fail', msg: `Got "${first.copy.name}" then "${second.copy.name}"` };
    }
    case 'dup_invalid_id': {
      const result = duplicateMaterialSim(baseList, 'does-not-exist');
      return result === null
        ? { status: 'pass', msg: 'Unknown id returns null (no copy)' }
        : { status: 'fail', msg: 'Should return null for unknown id' };
    }
    default:
      return { status: 'warn', msg: 'Unknown duplication check' };
  }
}

// ============================================================
// TopBar Active Nav Logic (mirrors TopBar.tsx active highlight)
// ============================================================
// Returns the id of the nav icon that should be lit for a given route,
// or null if no nav icon is active (e.g. Home).
function activeNavFor(pathname) {
  if (pathname === '/cure-history') return 'history';
  if (pathname === '/alerts') return 'alerts';
  if (pathname === '/settings') return 'settings';
  if (pathname === '/network') return 'network';
  return null;
}

// Mirrors the Globe icon className resolution in TopBar.tsx.
// Returns null when the icon should inherit the parent's color (text-primary when active).
function globeIconColor(isCuring, connected, pathname) {
  if (isCuring) return 'opacity-30';
  if (!connected) return 'text-destructive';
  if (pathname === '/network') return null; // active → inherit primary (blue)
  return 'text-white';
}

function runNavCheck(check) {
  switch (check) {
    case 'nav_settings': {
      return activeNavFor('/settings') === 'settings'
        ? { status: 'pass', msg: 'Settings icon lit on /settings' }
        : { status: 'fail', msg: 'Settings icon not active on /settings' };
    }
    case 'nav_network': {
      return activeNavFor('/network') === 'network'
        ? { status: 'pass', msg: 'Network icon lit on /network' }
        : { status: 'fail', msg: 'Network icon not active on /network' };
    }
    case 'nav_alerts': {
      return activeNavFor('/alerts') === 'alerts'
        ? { status: 'pass', msg: 'Alerts icon lit on /alerts' }
        : { status: 'fail', msg: 'Alerts icon not active on /alerts' };
    }
    case 'nav_history': {
      return activeNavFor('/cure-history') === 'history'
        ? { status: 'pass', msg: 'History icon lit on /cure-history' }
        : { status: 'fail', msg: 'History icon not active on /cure-history' };
    }
    case 'nav_home_none': {
      return activeNavFor('/') === null
        ? { status: 'pass', msg: 'No nav icon lit on Home' }
        : { status: 'fail', msg: 'Home should not light any nav icon' };
    }
    case 'nav_single_active': {
      // Exactly one icon may be active for any given settings-area route
      const routes = ['/settings', '/network', '/alerts', '/cure-history'];
      const ok = routes.every(r => {
        const active = activeNavFor(r);
        return active !== null && routes.filter(x => activeNavFor(x) === active).length === 1;
      });
      return ok
        ? { status: 'pass', msg: 'Exactly one icon active per route' }
        : { status: 'fail', msg: 'Multiple or zero icons active for a route' };
    }
    case 'nav_globe_active_blue': {
      // null = no explicit color → inherits the parent's text-primary (blue) when active
      const c = globeIconColor(false, true, '/network');
      return c === null
        ? { status: 'pass', msg: 'Active globe inherits primary (blue)' }
        : { status: 'fail', msg: `Active globe forced to ${c} instead of inheriting blue` };
    }
    case 'nav_globe_inactive_white': {
      const c = globeIconColor(false, true, '/settings');
      return c === 'text-white'
        ? { status: 'pass', msg: 'Inactive connected globe is white' }
        : { status: 'fail', msg: `Expected white, got ${c}` };
    }
    case 'nav_globe_disconnected_red': {
      const c = globeIconColor(false, false, '/network');
      return c === 'text-destructive'
        ? { status: 'pass', msg: 'Disconnected globe stays red even when active' }
        : { status: 'fail', msg: `Expected red, got ${c}` };
    }
    default:
      return { status: 'warn', msg: 'Unknown nav check' };
  }
}

// ============================================================
// TopBar N₂ Icon Logic (mirrors TopBar.tsx nitrogen indicator)
// ============================================================
// The N₂ icon is rendered only when nitrogen mode is enabled.
function n2IconVisible(nitrogenMode) {
  return !!nitrogenMode;
}

function runN2IconCheck(check) {
  switch (check) {
    case 'n2_hidden_when_off': {
      return n2IconVisible(false) === false
        ? { status: 'pass', msg: 'N₂ icon hidden when nitrogen mode is off' }
        : { status: 'fail', msg: 'N₂ icon should be hidden when off' };
    }
    case 'n2_shown_when_on': {
      return n2IconVisible(true) === true
        ? { status: 'pass', msg: 'N₂ icon shown when nitrogen mode is on' }
        : { status: 'fail', msg: 'N₂ icon should be shown when on' };
    }
    default:
      return { status: 'warn', msg: 'Unknown N₂ icon check' };
  }
}

// ============================================================
// Wake Screen blackout (mirrors WakeScreen showHint + tap-to-wake)
// ============================================================
// Sleep mode (blank=true) stays fully black until first touch; screensaver always shows the hint.
function wakeScreenView(blank, tapCount) {
  const showHint = !blank || tapCount > 0;
  return { black: !showHint, woke: tapCount >= 2 };
}

function runWakeScreenCheck(check) {
  switch (check) {
    case 'wake_sleep_black': {
      const v = wakeScreenView(true, 0); // sleep, untouched
      return v.black
        ? { status: 'pass', msg: 'Sleep screen is fully black (screen protected)' }
        : { status: 'fail', msg: 'Sleep screen should be black' };
    }
    case 'wake_sleep_hint_after_touch': {
      const v = wakeScreenView(true, 1); // sleep, first touch
      return !v.black
        ? { status: 'pass', msg: 'Wake hint appears after first touch' }
        : { status: 'fail', msg: 'Hint should show after touch' };
    }
    case 'wake_two_taps_wakes': {
      const v = wakeScreenView(true, 2);
      return v.woke
        ? { status: 'pass', msg: 'Two taps wake the system' }
        : { status: 'fail', msg: 'Two taps should wake' };
    }
    case 'wake_screensaver_black': {
      const v = wakeScreenView(true, 0); // screensaver, untouched — now blank like sleep
      return v.black
        ? { status: 'pass', msg: 'Screensaver is fully black (screen protected)' }
        : { status: 'fail', msg: 'Screensaver should be black until touched' };
    }
    case 'wake_screensaver_hint_after_touch': {
      const v = wakeScreenView(true, 1); // screensaver, first touch
      return !v.black
        ? { status: 'pass', msg: 'Wake hint appears after first touch' }
        : { status: 'fail', msg: 'Hint should show after touch' };
    }
    default:
      return { status: 'warn', msg: 'Unknown wake-screen check' };
  }
}

// ============================================================
// Boot vs Sleep-Resume (mirrors App.tsx asleep/booting init)
// ============================================================
// The boot/diagnostics screen shows only on a real power-up, not when resuming from sleep.
// shutdownFlag is the value of sessionStorage 'scure-shutdown' present at mount.
function bootDecision(shutdownFlag) {
  return {
    asleep: shutdownFlag === 'true',
    booting: shutdownFlag !== 'true',
  };
}

// ============================================================
// SRS Document Version History (mirrors docs/sCure_SRS.html setVersions/getVersions)
// Snapshots are archived as JSON inside a <script type="application/json"> tag, so any
// "</" must be escaped to "<\/" or an embedded closing script tag would truncate the file.
// ============================================================
function srsEncodeVersions(arr) {
  return JSON.stringify(arr).replace(/<\//g, '<\\/'); // exact logic from setVersions()
}
function srsDecodeVersions(text) {
  try { return JSON.parse(text || '[]') || []; } catch (e) { return null; } // getVersions()
}
function deepEqual(a, b) { return JSON.stringify(a) === JSON.stringify(b); }

function runSrsVersionCheck(check) {
  const CLOSE = '</' + 'script>'; // avoid a literal closing tag in this file too
  switch (check) {
    case 'srs_roundtrip_plain': {
      const arr = [{ n: 'Baseline', date: '2026-06-30', author: '—', change: 'pristine', html: '<!DOCTYPE html>\n<html><body><p>v1</p></body></html>' }];
      const back = srsDecodeVersions(srsEncodeVersions(arr));
      return deepEqual(arr, back)
        ? { status: 'pass', msg: 'Plain version round-trips unchanged' }
        : { status: 'fail', msg: 'Round-trip altered the version data' };
    }
    case 'srs_roundtrip_scripttag': {
      const html = '<html><body><script>var x="' + CLOSE + '";' + CLOSE + '<p>old</p></body></html>';
      const arr = [{ n: '3', date: '2026-06-30', author: 'Amitai', change: 'edit', html }];
      const back = srsDecodeVersions(srsEncodeVersions(arr));
      return back && back[0] && back[0].html === html && back[0].html.includes(CLOSE)
        ? { status: 'pass', msg: 'Embedded closing script tag survives the round-trip' }
        : { status: 'fail', msg: 'Closing script tag was lost or corrupted' };
    }
    case 'srs_no_raw_close': {
      const arr = [{ n: '1', html: 'before' + CLOSE + 'after' }];
      const encoded = srsEncodeVersions(arr);
      return !encoded.includes(CLOSE)
        ? { status: 'pass', msg: 'Encoded archive has no raw closing script tag' }
        : { status: 'fail', msg: 'Raw closing script tag present — file would truncate' };
    }
    case 'srs_unicode': {
      const arr = [{ n: '2', author: 'אמיתי', change: 'שינוי', html: '<p>גרסה ישנה של המסמך</p>' }];
      const back = srsDecodeVersions(srsEncodeVersions(arr));
      return back && deepEqual(arr, back) && back[0].html.includes('גרסה ישנה')
        ? { status: 'pass', msg: 'Hebrew/Unicode content preserved' }
        : { status: 'fail', msg: 'Unicode content not preserved' };
    }
    case 'srs_empty_archive': {
      const back = srsDecodeVersions('[]');
      return Array.isArray(back) && back.length === 0
        ? { status: 'pass', msg: 'Empty archive parses to an empty list' }
        : { status: 'fail', msg: 'Empty archive did not parse to []' };
    }
    default:
      return { status: 'warn', msg: 'Unknown SRS version check' };
  }
}

function runBootCheck(check) {
  switch (check) {
    case 'boot_cold_shows_diag': {
      const d = bootDecision(null); // no shutdown flag = cold power-up
      return d.booting && !d.asleep
        ? { status: 'pass', msg: 'Cold start shows boot/diagnostics' }
        : { status: 'fail', msg: 'Cold start should boot' };
    }
    case 'boot_sleep_no_diag': {
      const d = bootDecision('true'); // resuming from sleep
      return !d.booting
        ? { status: 'pass', msg: 'No diagnostics screen when resuming from sleep' }
        : { status: 'fail', msg: 'Sleep resume must skip boot screen' };
    }
    case 'boot_sleep_shows_wake': {
      const d = bootDecision('true');
      return d.asleep
        ? { status: 'pass', msg: 'Sleep resume shows wake screen' }
        : { status: 'fail', msg: 'Sleep resume should be asleep' };
    }
    case 'boot_cold_not_asleep': {
      const d = bootDecision(null);
      return !d.asleep
        ? { status: 'pass', msg: 'Cold start is not asleep' }
        : { status: 'fail', msg: 'Cold start should not be asleep' };
    }
    default:
      return { status: 'warn', msg: 'Unknown boot check' };
  }
}

// ============================================================
// Per-Fan Diagnostic (mirrors SettingsPage handleFanTest / FanRow)
// ============================================================
const FAN_RPM_SIM = { led_cooling: 2850, chamber_intake: 3050, chamber_heating: 2780 };
const FAN_IDS = ['led_cooling', 'chamber_intake', 'chamber_heating'];

// Simulates running a fan's diagnostic; rpm null = unknown fan.
function fanTestResultSim(id) {
  const rpm = FAN_RPM_SIM[id] ?? null;
  return { rpm, ok: rpm != null && rpm >= 2000 }; // healthy fans spin well above 2000 RPM
}

// ============================================================
// UX ↔ Hardware compatibility mirrors — same rules as MaterialContext.parseCsv,
// CureProcessPage cooling completion and io_controller delta-sigma heating.
// ============================================================
function runHwCompatCheck(check) {
  // Mirror of the CSV import range rules (hardware-authoritative)
  const csvTempOk = (proc, t) => proc === 'Cooling' ? (t >= 20 && t <= 75) : (t >= 30 && t <= 80);
  const csvUvOk = (v) => v >= 10 && v <= 100;
  switch (check) {
    case 'hwc_csv_heat_min': {
      const cases = [['Heating', 25, false], ['Heating', 30, true], ['Drying', 29, false], ['Cure', 30, true], ['Cooling', 25, true]];
      const bad = cases.filter(([p, t, exp]) => csvTempOk(p, t) !== exp);
      return bad.length === 0
        ? { status: 'pass', msg: `${cases.length} heating-floor cases match the 30°C driver minimum` }
        : { status: 'fail', msg: `${bad.length} wrong: ${bad.map(c => `${c[0]}@${c[1]}`).join(', ')}` };
    }
    case 'hwc_csv_uv_min': {
      const cases = [[5, false], [9, false], [10, true], [100, true], [101, false]];
      const bad = cases.filter(([v, exp]) => csvUvOk(v) !== exp);
      return bad.length === 0
        ? { status: 'pass', msg: 'UV floor matches led_power.min_intensity (10%)' }
        : { status: 'fail', msg: `${bad.length} wrong UV bounds` };
    }
    case 'hwc_csv_cool_drop': {
      // Cooling target must be at least 5°C below the previous step's temp
      const coolOk = (prevTemp, target) => prevTemp == null || target <= prevTemp - 5;
      const cases = [[60, 25, true], [60, 56, false], [60, 55, true], [null, 25, true], [40, 38, false]];
      const bad = cases.filter(([p, t, exp]) => coolOk(p, t) !== exp);
      return bad.length === 0
        ? { status: 'pass', msg: 'Cooling-drop rule (≥5°C below previous) enforced' }
        : { status: 'fail', msg: `${bad.length} wrong cooling-drop cases` };
    }
    case 'hwc_cool_done_band': {
      // Mirror of CureProcessPage: cooling completes at target + 0.5°C
      const coolDone = (chamber, target) => chamber <= target + 0.5;
      const cases = [[60, 25, false], [25.6, 25, false], [25.5, 25, true], [25, 25, true], [24, 25, true]];
      const bad = cases.filter(([c, tg, exp]) => coolDone(c, tg) !== exp);
      return bad.length === 0
        ? { status: 'pass', msg: 'Cooling completion follows the measured temp (±0.5°C band)' }
        : { status: 'fail', msg: `${bad.length} wrong completion cases` };
    }
    case 'hwc_deltasigma': {
      // Mirror of temperature_control delta-sigma: average ON ratio ≈ duty
      const dutyToRatio = (duty, cycles) => {
        let sigma = 0, on = 0;
        for (let i = 0; i < cycles; i++) {
          sigma += duty;
          if (sigma >= 100) { sigma -= 100; on++; }
        }
        return (on / cycles) * 100;
      };
      const cases = [0, 10, 25, 50, 75, 100];
      const bad = cases.filter(d => Math.abs(dutyToRatio(d, 200) - d) > 1);
      return bad.length === 0
        ? { status: 'pass', msg: 'Delta-sigma ON-ratio tracks PI duty within 1% over 200 cycles' }
        : { status: 'fail', msg: `Duty mismatch at: ${bad.join(', ')}%` };
    }
  }
  return { status: 'fail', msg: 'Unknown check: ' + check };
}

function runFanTestCheck(check) {
  switch (check) {
    case 'fant_led_cooling': {
      const r = fanTestResultSim('led_cooling');
      return r.ok && r.rpm === 2850 ? { status: 'pass', msg: `LED Cooling: ${r.rpm} RPM OK` } : { status: 'fail', msg: `Got ${r.rpm} RPM` };
    }
    case 'fant_chamber_intake': {
      const r = fanTestResultSim('chamber_intake');
      return r.ok && r.rpm === 3050 ? { status: 'pass', msg: `Chamber Intake: ${r.rpm} RPM OK` } : { status: 'fail', msg: `Got ${r.rpm} RPM` };
    }
    case 'fant_chamber_heating': {
      const r = fanTestResultSim('chamber_heating');
      return r.ok && r.rpm === 2780 ? { status: 'pass', msg: `Chamber Heating: ${r.rpm} RPM OK` } : { status: 'fail', msg: `Got ${r.rpm} RPM` };
    }
    case 'fant_each_fan_has_test': {
      // Every fan must produce its own healthy result
      const allOk = FAN_IDS.every(id => fanTestResultSim(id).ok);
      return allOk ? { status: 'pass', msg: `All ${FAN_IDS.length} fans have a diagnostic` } : { status: 'fail', msg: 'A fan is missing its diagnostic' };
    }
    case 'fant_distinct_rpm': {
      // Each fan reports its own RPM (not a single shared value)
      const rpms = FAN_IDS.map(id => fanTestResultSim(id).rpm);
      const distinct = new Set(rpms).size === rpms.length;
      return distinct ? { status: 'pass', msg: `Per-fan RPM: ${rpms.join(', ')}` } : { status: 'fail', msg: 'Fans share one RPM value' };
    }
    case 'fant_unknown_fan': {
      const r = fanTestResultSim('does_not_exist');
      return r.rpm === null && !r.ok ? { status: 'pass', msg: 'Unknown fan reports no result' } : { status: 'fail', msg: 'Unknown fan should have no RPM' };
    }
    default:
      return { status: 'warn', msg: 'Unknown fan-test check' };
  }
}

// ============================================================
// Cure Phase Gauge Value (mirrors CureProcessPage getGaugeInfo heating/drying)
// ============================================================
// Ramp → gauge shows climbing temperature; HOLD (target reached) → gauge shows the remaining time.
function formatTimeForTest(totalSeconds) {
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function getHeatingGaugeSim(phase, ctx) {
  const { status = 'active', isRamping = false, chamberTemp = 25, elapsed = 0 } = ctx;
  const isActiveRamping = status === 'active' && isRamping;
  const isActiveHolding = status === 'active' && !isRamping;
  const remaining = Math.max(0, phase.time * 60 - elapsed);
  return {
    value: isActiveRamping ? `${chamberTemp}` : isActiveHolding ? formatTimeForTest(remaining) : status === 'completed' ? `${phase.temp}` : '0',
    label: isActiveRamping ? 'RAMP °C' : isActiveHolding ? 'REMAINING' : 'HOLD °C',
  };
}

function runGaugeValueCheck(check) {
  switch (check) {
    case 'gv_hold_shows_time': {
      // HOLD: 10min phase, 7s in → gauge shows 09:53 with REMAINING label
      const g = getHeatingGaugeSim({ type: 'drying', temp: 45, time: 10 }, { status: 'active', isRamping: false, elapsed: 7 });
      return g.value === '09:53' && g.label === 'REMAINING'
        ? { status: 'pass', msg: `Gauge shows ${g.value} (${g.label})` }
        : { status: 'fail', msg: `Expected 09:53/REMAINING, got ${g.value}/${g.label}` };
    }
    case 'gv_ramp_shows_temp': {
      // RAMP: gauge shows the climbing chamber temperature, not time
      const g = getHeatingGaugeSim({ type: 'heating', temp: 60, time: 5 }, { status: 'active', isRamping: true, chamberTemp: 38 });
      return g.value === '38' && g.label === 'RAMP °C'
        ? { status: 'pass', msg: `Gauge shows ${g.value} (${g.label})` }
        : { status: 'fail', msg: `Expected 38/RAMP °C, got ${g.value}/${g.label}` };
    }
    case 'gv_hold_never_negative': {
      // Overrun clamps the countdown to 00:00
      const g = getHeatingGaugeSim({ type: 'heating', temp: 40, time: 1 }, { status: 'active', isRamping: false, elapsed: 120 });
      return g.value === '00:00'
        ? { status: 'pass', msg: 'Countdown clamped to 00:00' }
        : { status: 'fail', msg: `Expected 00:00, got ${g.value}` };
    }
    case 'gv_completed_shows_temp': {
      // Completed phase shows the hold temperature again
      const g = getHeatingGaugeSim({ type: 'drying', temp: 45, time: 10 }, { status: 'completed' });
      return g.value === '45' && g.label === 'HOLD °C'
        ? { status: 'pass', msg: `Completed shows ${g.value} (${g.label})` }
        : { status: 'fail', msg: `Expected 45/HOLD °C, got ${g.value}/${g.label}` };
    }
    default:
      return { status: 'warn', msg: 'Unknown gauge-value check' };
  }
}

// ============================================================
// Material Favorites Logic (mirrors MaterialContext + HomePage sort)
// ============================================================
function toggleFavoriteSim(favoriteIds, id) {
  return favoriteIds.includes(id) ? favoriteIds.filter(f => f !== id) : [...favoriteIds, id];
}

// Stable sort: favorites first, original order preserved within each group.
function sortByFavorite(list, favoriteIds) {
  return [...list].sort((a, b) =>
    (favoriteIds.includes(b.id) ? 1 : 0) - (favoriteIds.includes(a.id) ? 1 : 0)
  );
}

function runFavoriteCheck(check) {
  const list = [
    { id: 'a', name: 'ST45' },
    { id: 'b', name: 'Carbon Fiber' },
    { id: 'c', name: 'Fiberglass' },
    { id: 'd', name: 'ABS-Like' },
  ];

  switch (check) {
    case 'fav_toggle_on': {
      const next = toggleFavoriteSim([], 'c');
      return next.includes('c') && next.length === 1
        ? { status: 'pass', msg: 'Star added to favorites' }
        : { status: 'fail', msg: 'Star not added' };
    }
    case 'fav_toggle_off': {
      const next = toggleFavoriteSim(['c'], 'c');
      return !next.includes('c') && next.length === 0
        ? { status: 'pass', msg: 'Star removed from favorites' }
        : { status: 'fail', msg: 'Star not removed' };
    }
    case 'fav_moves_to_top': {
      const sorted = sortByFavorite(list, ['c']);
      return sorted[0].id === 'c'
        ? { status: 'pass', msg: 'Starred item moved to top' }
        : { status: 'fail', msg: `Top is "${sorted[0].id}", expected "c"` };
    }
    case 'fav_order_stable': {
      // Non-favorites keep their original relative order
      const sorted = sortByFavorite(list, ['c']);
      const rest = sorted.filter(m => m.id !== 'c').map(m => m.id).join(',');
      return rest === 'a,b,d'
        ? { status: 'pass', msg: 'Non-favorites keep original order' }
        : { status: 'fail', msg: `Order was "${rest}", expected "a,b,d"` };
    }
    case 'fav_multiple_top': {
      // Multiple favorites all rise to the top, in original order
      const sorted = sortByFavorite(list, ['b', 'd']);
      const top2 = sorted.slice(0, 2).map(m => m.id).join(',');
      return top2 === 'b,d'
        ? { status: 'pass', msg: 'Multiple favorites grouped at top (b,d)' }
        : { status: 'fail', msg: `Top two were "${top2}", expected "b,d"` };
    }
    case 'fav_none_unchanged': {
      // No favorites → list order is unchanged
      const sorted = sortByFavorite(list, []);
      const order = sorted.map(m => m.id).join(',');
      return order === 'a,b,c,d'
        ? { status: 'pass', msg: 'No favorites keeps list order' }
        : { status: 'fail', msg: `Order was "${order}"` };
    }
    default:
      return { status: 'warn', msg: 'Unknown favorite check' };
  }
}

// ============================================================
// CSV Import Validation (mirrors MaterialContext.parseCsv)
// ============================================================
const VALID_PROCESSES = ['Heating', 'Drying', 'Cure', 'Cooling', 'Bleacher', 'Nitrogen'];

function parseCsvForTest(csvContent) {
  const errors = [];
  const lines = csvContent.trim().split('\n');
  if (lines.length < 2) return { steps: null, errors: ['CSV must have a header row and at least one data row'] };

  const header = lines[0].toLowerCase();
  if (!header.includes('process') && !header.includes('step')) return { steps: null, errors: ['Missing required header'] };

  const steps = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.trim());
    if (cols.length < 4) { errors.push(`Row ${i}: Not enough columns`); continue; }

    const process = cols[1];
    if (!VALID_PROCESSES.includes(process)) { errors.push(`Row ${i}: Invalid process "${process}"`); continue; }

    let time = 0;
    if (process !== 'Cooling' && process !== 'Nitrogen') {
      // Bleaching may run up to 12 hours (720 min); others cap at 120 min.
      const maxTime = process === 'Bleacher' ? 720 : 120;
      time = parseInt(cols[3]);
      if (isNaN(time) || time < 1 || time > maxTime) { errors.push(`Row ${i}: Invalid time "${cols[3]}" (must be 1-${maxTime})`); continue; }
    }

    const step = { step: parseInt(cols[0]) || i, process, temperature: null, time };

    if (process === 'Nitrogen') { steps.push(step); continue; }

    const temp = cols[2] ? Number(cols[2]) : null;
    if (temp !== null && (isNaN(temp) || temp < 20 || temp > 80)) { errors.push(`Row ${i}: Invalid temperature "${cols[2]}"`); continue; }
    step.temperature = temp ?? (process === 'Cooling' ? 25 : 40);

    if (process === 'Cooling') {
      step.coolingMode = cols[8] || 'medium';
    }
    if (process === 'Cure' || process === 'Bleacher') {
      step.timerMode = cols[4] || '';
      step.uvIntensity = cols[5] ? Number(cols[5]) : null;
      step.uvStartMode = cols[6] || '';
    }
    steps.push(step);
  }

  if (steps.length === 0) return { steps: null, errors: errors.length > 0 ? errors : ['No valid steps found'] };

  // Sequence validation
  let n2Count = 0, needsCoolingOrDrying = false, lastTemp = null;
  for (let i = 0; i < steps.length; i++) {
    const s = steps[i], prev = i > 0 ? steps[i - 1] : null;
    if (s.process === 'Nitrogen') { n2Count++; if (n2Count > 2) errors.push(`Step ${s.step}: Maximum 2 nitrogen steps`); }
    if (prev?.process === 'Nitrogen' && s.process !== 'Cure' && s.process !== 'Bleacher') {
      errors.push(`Step ${s.step}: After nitrogen, only Cure or Bleaching is allowed`);
    }
    if (prev && (prev.process === 'Cure' || prev.process === 'Bleacher')) {
      const prevPrev = i > 1 ? steps[i - 2] : null;
      if (prevPrev?.process === 'Nitrogen' && s.process !== 'Cooling') {
        errors.push(`Step ${s.step}: After the Cure/Bleaching that follows N₂, only Cooling is allowed`);
      }
    }
    if (s.process === 'Nitrogen') needsCoolingOrDrying = true;
    if (needsCoolingOrDrying && s.process === 'Cooling') needsCoolingOrDrying = false;
    if (s.process !== 'Cooling' && s.process !== 'Nitrogen' && s.temperature != null) {
      if (lastTemp !== null && s.temperature < lastTemp) errors.push(`Step ${s.step}: Temperature cannot decrease without Cooling`);
      lastTemp = s.temperature;
    }
    if (s.process === 'Cooling') lastTemp = null;
  }
  if (needsCoolingOrDrying) errors.push('Nitrogen must be vented — add a Cooling step');

  const hasNitrogen = steps.some(s => s.process === 'Nitrogen');
  if (hasNitrogen) {
    let found = false, afterN2 = false;
    for (const s of steps) {
      if (s.process === 'Nitrogen') afterN2 = true;
      if (afterN2 && (s.process === 'Cure' || s.process === 'Bleacher')) { found = true; break; }
    }
    if (!found) errors.push('Add a Cure or Bleaching step after N₂ purge');
  }

  return { steps, errors };
}

function runCsvImportCheck(check) {
  const H = 'Step,Process,Temperature,Time,TimerMode,UVIntensity,UVStart,UVRampPercent,CoolingMode';

  switch (check) {
    case 'csv_valid_basic': {
      const r = parseCsvForTest(`${H}\n1,Heating,40,10,,,,,\n2,Cooling,25,,,,,,medium`);
      return r.errors.length === 0 ? { status: 'pass', msg: `${r.steps.length} steps parsed` } : { status: 'fail', msg: r.errors[0] };
    }
    case 'csv_valid_n2': {
      const r = parseCsvForTest(`${H}\n1,Heating,40,10,,,,,\n2,Nitrogen,,,,,,,\n3,Cure,40,15,on-target,30,at-target,,\n4,Cooling,25,,,,,,medium`);
      return r.errors.length === 0 ? { status: 'pass', msg: `${r.steps.length} steps with N₂` } : { status: 'fail', msg: r.errors[0] };
    }
    case 'csv_valid_full': {
      // All 6 process types; N₂ → Cure → Cooling block kept valid (Bleaching placed before N₂)
      const r = parseCsvForTest(`${H}\n1,Drying,40,10,,,,,\n2,Heating,60,5,,,,,\n3,Bleacher,60,10,on-target,40,at-start,,\n4,Nitrogen,,,,,,,\n5,Cure,60,15,on-target,30,at-target,,\n6,Cooling,25,,,,,,fast`);
      return r.errors.length === 0 && r.steps.length === 6 ? { status: 'pass', msg: 'All 6 process types OK' } : { status: 'fail', msg: r.errors[0] || 'Wrong step count' };
    }
    case 'csv_invalid_process': {
      const r = parseCsvForTest(`${H}\n1,Baking,40,10,,,,,`);
      return r.errors.some(e => e.includes('Invalid process')) ? { status: 'pass', msg: 'Rejected invalid process' } : { status: 'fail', msg: 'Should reject invalid process' };
    }
    case 'csv_bad_temp': {
      const r = parseCsvForTest(`${H}\n1,Heating,90,10,,,,,`);
      return r.errors.some(e => e.includes('temperature')) ? { status: 'pass', msg: 'Rejected temp 90°C' } : { status: 'fail', msg: 'Should reject temp >80' };
    }
    case 'csv_bad_time': {
      const r = parseCsvForTest(`${H}\n1,Heating,40,150,,,,,`);
      return r.errors.some(e => e.includes('time')) ? { status: 'pass', msg: 'Rejected time 150min' } : { status: 'fail', msg: 'Should reject time >120' };
    }
    case 'csv_bleach_12h': {
      // 720 min Bleaching is allowed; preceding Heating keeps temps non-decreasing.
      const r = parseCsvForTest(`${H}\n1,Heating,40,10,,,,,\n2,Bleacher,40,720,on-target,40,at-target,,`);
      return r.errors.length === 0 ? { status: 'pass', msg: 'Bleaching 720min accepted' } : { status: 'fail', msg: r.errors[0] };
    }
    case 'csv_bleach_over12h': {
      const r = parseCsvForTest(`${H}\n1,Heating,40,10,,,,,\n2,Bleacher,40,721,on-target,40,at-target,,`);
      return r.errors.some(e => e.includes('time')) ? { status: 'pass', msg: 'Rejected Bleaching 721min' } : { status: 'fail', msg: 'Should reject Bleaching >720' };
    }
    case 'csv_n2_no_process': {
      const r = parseCsvForTest(`${H}\n1,Heating,40,10,,,,,\n2,Nitrogen,,,,,,,\n3,Cooling,25,,,,,,medium`);
      return r.errors.length > 0 ? { status: 'pass', msg: 'Blocked: ' + r.errors[0] } : { status: 'fail', msg: 'Should block N₂ → Cooling without process' };
    }
    case 'csv_n2_no_cooling': {
      const r = parseCsvForTest(`${H}\n1,Heating,40,10,,,,,\n2,Nitrogen,,,,,,,\n3,Heating,60,10,,,,,`);
      return r.errors.some(e => e.toLowerCase().includes('cool') || e.toLowerCase().includes('vent')) ? { status: 'pass', msg: 'Blocked: missing cooling' } : { status: 'fail', msg: 'Should block N₂ without Cooling' };
    }
    case 'csv_n2_max3': {
      const r = parseCsvForTest(`${H}\n1,Heating,40,10,,,,,\n2,Nitrogen,,,,,,,\n3,Cure,40,10,,,,,\n4,Cooling,25,,,,,,medium\n5,Nitrogen,,,,,,,\n6,Heating,60,10,,,,,\n7,Cooling,25,,,,,,medium\n8,Nitrogen,,,,,,,\n9,Heating,60,10,,,,,\n10,Cooling,25,,,,,,medium`);
      return r.errors.some(e => e.includes('Maximum 2')) ? { status: 'pass', msg: 'Blocked 3rd N₂' } : { status: 'fail', msg: 'Should block >2 N₂ steps' };
    }
    case 'csv_temp_decrease': {
      const r = parseCsvForTest(`${H}\n1,Heating,60,10,,,,,\n2,Heating,40,10,,,,,`);
      return r.errors.some(e => e.includes('decrease') || e.includes('lower')) ? { status: 'pass', msg: 'Blocked temp decrease' } : { status: 'fail', msg: 'Should block temp 60→40 without Cooling' };
    }
    case 'csv_cooling_mode': {
      const r = parseCsvForTest(`${H}\n1,Heating,40,10,,,,,\n2,Cooling,25,,,,,,fast`);
      if (r.errors.length > 0) return { status: 'fail', msg: r.errors[0] };
      const cooling = r.steps.find(s => s.process === 'Cooling');
      return cooling?.coolingMode === 'fast' ? { status: 'pass', msg: 'CoolingMode=fast parsed' } : { status: 'fail', msg: 'CoolingMode not parsed: ' + cooling?.coolingMode };
    }
    case 'csv_empty': {
      const r = parseCsvForTest(`${H}`);
      return r.steps === null || r.errors.length > 0 ? { status: 'pass', msg: 'Empty CSV rejected' } : { status: 'fail', msg: 'Should reject empty CSV' };
    }
    default:
      return { status: 'warn', msg: 'Unknown CSV check' };
  }
}

// ============================================================
// CSV Format Tests (export format verification)
// ============================================================
function runCsvFormatCheck(check) {
  const H = 'Step,Process,Temperature,Time,TimerMode,UVIntensity,UVStart,UVRampPercent,CoolingMode';

  switch (check) {
    case 'fmt_header': {
      const expected = 'Step,Process,Temperature,Time,TimerMode,UVIntensity,UVStart,UVRampPercent,CoolingMode';
      const cols = expected.split(',');
      return cols.length === 9 ? { status: 'pass', msg: '9 columns: ' + cols.join(', ') } : { status: 'fail', msg: 'Expected 9 columns, got ' + cols.length };
    }
    case 'fmt_nitrogen_row': {
      const row = '2,Nitrogen,,,,,,,';
      const cols = row.split(',');
      const temp = cols[2], time = cols[3];
      return (temp === '' && time === '') ? { status: 'pass', msg: 'N₂ row: empty temp & time' } : { status: 'fail', msg: `N₂ has temp="${temp}" time="${time}"` };
    }
    case 'fmt_cooling_row': {
      const row = '5,Cooling,25,,,,,,medium';
      const cols = row.split(',');
      const mode = cols[8], time = cols[3];
      return (time === '' && ['fast', 'medium', 'slow'].includes(mode)) ? { status: 'pass', msg: `CoolingMode="${mode}", no time` } : { status: 'fail', msg: `mode="${mode}" time="${time}"` };
    }
    case 'fmt_cure_row': {
      const row = '3,Cure,60,15,on-target,30,at-target,,';
      const cols = row.split(',');
      const tm = cols[4], uv = cols[5], us = cols[6];
      const ok = ['on-ramp', 'on-target'].includes(tm) && Number(uv) >= 5 && ['at-start', 'at-target'].includes(us);
      return ok ? { status: 'pass', msg: `TimerMode=${tm} UV=${uv}% UVStart=${us}` } : { status: 'fail', msg: `tm=${tm} uv=${uv} us=${us}` };
    }
    case 'fmt_roundtrip': {
      const csv = `${H}\n1,Drying,40,10,,,,,\n2,Heating,60,5,,,,,\n3,Nitrogen,,,,,,,\n4,Cure,60,15,on-target,30,at-target,,\n5,Cooling,25,,,,,,medium`;
      const r = parseCsvForTest(csv);
      return r.errors.length === 0 && r.steps.length === 5 ? { status: 'pass', msg: '5 steps roundtripped OK' } : { status: 'fail', msg: r.errors[0] || 'Wrong step count' };
    }
    default:
      return { status: 'warn', msg: 'Unknown format check' };
  }
}

// ============================================================
// Logging
// ============================================================
function log(level, msg) {
  const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
  logLines.push({ ts, level, msg });
  const logBox = document.getElementById('logBox');
  logBox.innerHTML += `<div class="log-line ${level}"><span class="ts">[${ts}]</span>${msg}</div>`;
  logBox.scrollTop = logBox.scrollHeight;
}

function clearLog() {
  logLines = [];
  document.getElementById('logBox').innerHTML = '';
}

// ============================================================
// Report Export
// ============================================================
function exportReport() {
  const now = new Date();
  const results = Object.values(testResults);
  const pass = results.filter(r => r === 'pass').length;
  const fail = results.filter(r => r === 'fail').length;
  const warn = results.filter(r => r === 'warn').length;

  let report = `sCure QA Report\n`;
  report += `${'='.repeat(50)}\n`;
  report += `Date: ${now.toLocaleString()}\n`;
  report += `API: ${document.getElementById('apiUrl').value}\n`;
  report += `Duration: ${startTime ? ((Date.now() - startTime) / 1000).toFixed(1) + 's' : 'N/A'}\n\n`;
  report += `Summary: ${pass} PASS / ${fail} FAIL / ${warn} WARN\n`;
  report += `${'='.repeat(50)}\n\n`;

  TEST_CATEGORIES.forEach(cat => {
    report += `[${cat.name}]\n`;
    cat.tests.forEach(t => {
      const status = (testResults[t.id] || 'pending').toUpperCase();
      const resultEl = document.getElementById('result-' + t.id);
      const timeEl = document.getElementById('time-' + t.id);
      report += `  ${status.padEnd(6)} ${t.name} — ${resultEl?.textContent || ''} ${timeEl?.textContent || ''}\n`;
    });
    report += '\n';
  });

  report += `\nLog:\n${'─'.repeat(50)}\n`;
  logLines.forEach(l => {
    report += `[${l.ts}] ${l.msg}\n`;
  });

  const blob = new Blob([report], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `scure-qa-report-${now.toISOString().slice(0, 10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// Init
init();
</script>
